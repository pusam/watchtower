server:
  port: 9090
  tomcat:
    max-swallow-size: 4MB
  max-http-request-header-size: 16KB

spring:
  application:
    name: watchtower
  thymeleaf:
    cache: false
  web:
    resources:
      cache:
        cachecontrol:
          no-cache: true
          no-store: true
          must-revalidate: true
  sql:
    init:
      mode: never

watchtower:
  audit:
    log-path: ${WATCHTOWER_AUDIT_LOG:./data/audit.log}
  poll-interval-ms: 5000
  history-size: 60
  request-timeout-ms: 3000
  push-stale-threshold-ms: 15000
  persistence:
    enabled: true
    # SQLite (default): used when jdbc-url is empty.
    db-path: ${WATCHTOWER_DB_PATH:./data/watchtower.db}
    # PostgreSQL (optional): set WATCHTOWER_JDBC_URL to enable.
    # e.g. jdbc:postgresql://db.internal:5432/watchtower
    jdbc-url: ${WATCHTOWER_JDBC_URL:}
    username: ${WATCHTOWER_JDBC_USER:}
    password: ${WATCHTOWER_JDBC_PASS:}
    pool-size: 8
    snapshot-retention-days: 7
    alarm-retention-days: 30
    restore-snapshots-per-host: 60
  alarms:
    enabled: true
    check-interval-ms: 10000
    cooldown-seconds: 300
    breach-duration-sec: 60
    slack-webhook-url: ${WATCHTOWER_SLACK_WEBHOOK:}
    cpu-threshold-pct: 90
    mem-threshold-pct: 90
    disk-threshold-pct: 85
    error-rate-threshold-pct: 5
    error-rate-window-sec: 60
    slow-response-ms: 3000
    cert-days-left-threshold: 14
    host-down-threshold-ms: 30000
    log-volume-threshold-pct: 80
    log-volume-check-interval-ms: 60000
  security:
    dashboard-username: ${WATCHTOWER_DASHBOARD_USER:admin}
    dashboard-password: ${WATCHTOWER_DASHBOARD_PASS:}
    # Per-agent HMAC credentials (recommended). Configure via environment variables:
    #   WATCHTOWER_SECURITY_AGENTS_0_ID=server-a
    #   WATCHTOWER_SECURITY_AGENTS_0_HMAC_SECRET=<openssl rand -hex 32>
    #   WATCHTOWER_SECURITY_AGENTS_0_PREVIOUS_HMAC_SECRETS_0=<old secret during rotation>
    # (do not define 'agents: []' here — that would override env-supplied values)
    # Legacy single-key fallback. Disable in production after migrating all agents.
    agent-api-key: ${WATCHTOWER_AGENT_API_KEY:}
    allow-legacy-api-key: ${WATCHTOWER_ALLOW_LEGACY_API_KEY:true}
    agent-max-clock-skew-seconds: 300
    # Bearer token for /actuator/prometheus scrape. Empty = endpoint blocked.
    # Generate: openssl rand -hex 32
    prometheus-scrape-token: ${WATCHTOWER_PROMETHEUS_SCRAPE_TOKEN:}
    allowed-origins:
      - ${WATCHTOWER_ALLOWED_ORIGIN:http://localhost:9090}
      - https://*.ngrok-free.dev
      - https://*.ngrok-free.app
      - https://*.ngrok.io
    # Per-agent cap on /api/agent/report calls. Default poll is 5s (12/min) but
    # the local retry queue can drain up to 20 entries per tick; allow headroom.
    max-registrations-per-minute: 60
  hosts:
    - id: server-a
      name: Fulfillment Server A
      agentUrl: http://192.168.0.10:19090
    - id: server-b
      name: Fulfillment Server B
      agentUrl: http://192.168.0.11:19090
  log-volumes: []
    # - id: app-logs
    #   name: Application Logs
    #   path: /var/log/app
    #   maxBytes: 10737418240   # 10 GiB
    # - id: watchtower-data
    #   name: Watchtower Data
    #   path: ./data
    #   maxBytes: 1073741824    # 1 GiB
  probes: []
    # - id: api-health
    #   name: API Health
    #   type: http
    #   target: https://example.com/health
    #   expectedStatus: 200
    #   timeoutMs: 3000
    #   intervalMs: 30000
    #   slowThresholdMs: 1500
    # - id: db-port
    #   name: MariaDB TCP
    #   type: tcp
    #   target: 192.168.0.10:3306
    #   timeoutMs: 2000
    #   intervalMs: 30000
    #   slowThresholdMs: 500

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
  prometheus:
    metrics:
      export:
        enabled: true

logging:
  level:
    root: INFO
    com.watchtower: DEBUG

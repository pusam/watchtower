# Default values for watchtower.
# Every Watchtower setting can be overridden via env (Spring relaxed binding,
# e.g. WATCHTOWER_SECURITY_OIDC_ENABLED=true). See `env` and `secretEnv` below.

replicaCount: 1

image:
  repository: watchtower
  tag: ""                 # defaults to Chart.appVersion
  pullPolicy: IfNotPresent

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: [ALL]

service:
  type: ClusterIP
  port: 9090

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: watchtower.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 1
    memory: 1Gi
  requests:
    cpu: 200m
    memory: 512Mi

# Persistence for SQLite DB + audit log. Only needed when using SQLite (the
# default). With an external PostgreSQL you can disable this.
persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 5Gi
  mountPath: /app/data

# Plain (non-secret) Watchtower settings. These are injected verbatim as env
# vars so Spring's relaxed binding applies. Prefer `secretEnv` for secrets.
env:
  WATCHTOWER_DB_PATH: /app/data/watchtower.db
  WATCHTOWER_AUDIT_LOG: /app/data/audit.log
  WATCHTOWER_ALLOWED_ORIGIN: "http://localhost:9090"
  WATCHTOWER_ALLOW_LEGACY_API_KEY: "false"
  # Enable anomaly detection after validating baseline behaviour.
  WATCHTOWER_ANOMALY_ENABLED: "false"
  # Uncomment to switch to PostgreSQL:
  # WATCHTOWER_JDBC_URL: jdbc:postgresql://pg.default:5432/watchtower

# Secret values stored in a chart-managed Secret. Leave empty to skip.
# Each key becomes an env var with the same name.
secretEnv:
  WATCHTOWER_DASHBOARD_PASS: ""
  WATCHTOWER_AGENT_API_KEY: ""
  WATCHTOWER_PROMETHEUS_SCRAPE_TOKEN: ""
  WATCHTOWER_SLACK_WEBHOOK: ""
  WATCHTOWER_TEAMS_WEBHOOK: ""
  WATCHTOWER_PAGERDUTY_ROUTING_KEY: ""
  WATCHTOWER_OPSGENIE_API_KEY: ""
  WATCHTOWER_JDBC_PASS: ""
  WATCHTOWER_OIDC_CLIENT_SECRET: ""

# Reference existing Secrets/ConfigMaps for additional env.
extraEnvFrom: []
# - secretRef:
#     name: watchtower-agent-hmac

livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5
  failureThreshold: 3

nodeSelector: {}
tolerations: []
affinity: {}

# Optional Prometheus Operator ServiceMonitor. Requires scrape-token populated
# in secretEnv (WATCHTOWER_PROMETHEUS_SCRAPE_TOKEN).
serviceMonitor:
  enabled: false
  interval: 30s
  scrapeTimeout: 10s
  labels: {}
  # Authorization header is pulled from the chart's Secret.
  bearerTokenSecret:
    name: ""              # defaults to <release>-secrets
    key: WATCHTOWER_PROMETHEUS_SCRAPE_TOKEN

{{- if .Values.serviceMonitor.enabled -}}
{{- $secretName := default (include "watchtower.secretName" .) .Values.serviceMonitor.bearerTokenSecret.name -}}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "watchtower.fullname" . }}
  labels:
    {{- include "watchtower.labels" . | nindent 4 }}
    {{- with .Values.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "watchtower.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: {{ .Values.serviceMonitor.interval | quote }}
      scrapeTimeout: {{ .Values.serviceMonitor.scrapeTimeout | quote }}
      authorization:
        type: Bearer
        credentials:
          name: {{ $secretName | quote }}
          key: {{ .Values.serviceMonitor.bearerTokenSecret.key | quote }}
{{- end -}}
